<!doctype html>
<!-- eyeball fixture: BAD (font). The headline renders in Arial (a banned system
     face) because no real face is set. eyeball reads the ACTUAL glyph face via CDP
     platform-fonts, so this is caught even though the source "looks" fine. ONLY the
     rendered-font check trips. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BAD font</title>
<style>
  html, body { margin: 0; padding: 0; overflow-x: hidden; background: #f4f4f5; color: #14141a; }
  [data-hero-h1] { font-family: Arial; font-size: 52px; line-height: 1.05;
    max-width: 820px; margin: 80px 48px 0; opacity: 1; }
  [data-reveal] { font-family: Georgia, serif; margin: 1600px 48px 0; }
  [data-signature] { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: -1; }
  [data-draggable] { position: fixed; right: 24px; bottom: 24px; width: 36px; height: 36px; }
</style>
</head>
<body>
  <svg data-signature aria-hidden="true" width="100%" height="100%"></svg>
  <h1 data-hero-h1>This headline silently renders in Arial.</h1>
  <button data-draggable aria-label="drag"></button>
  <p data-reveal>below</p>
</body>
</html>
