<!doctype html>
<!-- eyeball fixture: BAD (draggable). The draggable control's centroid lands ON the
     headline box. ONLY the draggable-on-hero check trips. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BAD draggable</title>
<style>
  html, body { margin: 0; padding: 0; overflow-x: hidden; background: #060814; color: #eef; }
  [data-hero-h1] { font-family: Georgia, serif; font-size: 52px; line-height: 1.05;
    max-width: 820px; margin: 80px 48px 0; opacity: 1; }
  [data-reveal] { font-family: Georgia, serif; margin: 1600px 48px 0; }
  [data-signature] { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: -1; }
  [data-draggable] { position: fixed; top: 110px; left: 360px; width: 32px; height: 32px;
    border-radius: 999px; background: #f5a623; border: 0; }
</style>
</head>
<body>
  <svg data-signature aria-hidden="true" width="100%" height="100%"></svg>
  <h1 data-hero-h1>A control is sitting on top of this headline.</h1>
  <button data-draggable aria-label="drag the marker"></button>
  <p data-reveal>below</p>
</body>
</html>
